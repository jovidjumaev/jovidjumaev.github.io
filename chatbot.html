<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI Chat Example</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>OpenAI Chat Example</h1>
    
    <!-- API Key Input Section -->
    <div id="apiKeySection">
        <h3>Enter your OpenAI API Key to start chatting:</h3>
        <input type="password" id="apiKeyInput" placeholder="Enter your OpenAI API key here..." />
        <button id="setApiKey">Set API Key</button>
        <p id="apiKeyStatus"></p>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">
            <strong>Security Note:</strong> Your API key is not stored anywhere and will be cleared when you close this page.
        </p>
    </div>
    
    <!-- Chat Section (initially hidden) -->
    <div id="chatSection" style="display: none;">
        <div id="chat"></div>
        <div style="margin-top: 10px;">
            <input type="text" id="input" placeholder="Type your message here..." />
            <button id="send">Send</button>
            <button id="clearChat">Clear Chat</button>
            <button id="changeApiKey" style="background-color: #6c757d; color: white; border: none; padding: 10px; margin-left: 5px; border-radius: 4px; cursor: pointer;">Change API Key</button>
        </div>
    </div>
</body>
</html>
