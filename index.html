<!DOCTYPE html>
<html lang="en">
<head>

            color: white;
        }

            max-width: 800px;
            margin: 0 auto;
            text-align: center;

            margin-bottom: 20px;

            gap: 20px;
            justify-content: center;

            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);

        .nav-link:hover {

            transform: translateY(-2px);
